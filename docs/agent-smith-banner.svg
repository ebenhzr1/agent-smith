<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="700" y2="50" stroke="#fff"/>
    <line x1="0" y1="100" x2="700" y2="100" stroke="#fff"/>
    <line x1="0" y1="150" x2="700" y2="150" stroke="#fff"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#fff"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#fff"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="#fff"/>
  </g>

  <!-- Bolt icon -->
  <text x="60" y="115" font-size="80" font-family="sans-serif">⚡</text>

  <!-- Title -->
  <text x="140" y="115" font-size="52" font-weight="bold" fill="#fff" font-family="monospace">Agent Smith</text>

  <!-- Tagline -->
  <text x="140" y="148" font-size="18" fill="#aaa" font-family="monospace">
    The universal package manager for AI agent skills
  </text>

  <!-- CLI example -->
  <rect x="140" y="160" width="400" height="24" rx="4" fill="#0d1117" opacity="0.6"/>
  <text x="150" y="177" font-size="13" fill="#00d2ff" font-family="monospace">
    $ agentsmith install code-reviewer
  </text>

  <!-- Version badge -->
  <rect x="560" y="30" width="110" height="28" rx="14" fill="#00d2ff" opacity="0.15"/>
  <text x="570" y="50" font-size="13" fill="#00d2ff" font-family="monospace" font-weight="bold">v0.1.0</text>

  <!-- Status badge -->
  <rect x="560" y="65" width="110" height="28" rx="14" fill="#3a7bd5" opacity="0.15"/>
  <text x="570" y="85" font-size="12" fill="#3a7bd5" font-family="monospace">⚡ npm for skills</text>
</svg>
